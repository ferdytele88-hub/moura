/* ===== BRAND COLOR ===== */
:root{
  --maroon:#800020;
  --brown:#5c2a2a;
}

/* ===== BODY ===== */
body{
  margin:0;
  font-family:Poppins,Arial,sans-serif;
  display:flex;
  justify-content:center;
  position:relative;
  overflow-x:hidden;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
  linear-gradient(
    rgba(128,0,32,0.65),
    #5c2a2abf
  ),
  url("bg5.PNG");
  background-size:cover;
  background-position:center;
  filter:blur(6px);
  transform:scale(1.1);
  z-index:-1;
}

/* ===== CONTAINER ===== */
.container{
  max-width:420px;
  width:100%;
  padding:25px;
  text-align:center;
}

/* ===== LOGO (UPDATED ✅) ===== */
.logo{
  width:200px;
  height:200px;
  margin:35px auto;
  border-radius:50%;
  overflow:hidden;
  background:white;

  display:flex;
  justify-content:center;
  align-items:center;

  box-shadow:0 15px 40px rgba(0,0,0,.4);

  animation:float 4s ease-in-out infinite;
}

.logo img{
  width:105%;
  height:auto;
  object-fit:contain;
}

/* FLOAT EFFECT */
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* ===== TEXT ===== */
h1{
  color:white;
  letter-spacing:2px;
}

p{
  color:#f1e4d8;
  font-size:14px;
}

/* ===== CARD ===== */
.card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.25);

  padding:18px;
  border-radius:25px;
  margin:15px 0;

  display:flex;
  justify-content:space-between;
  align-items:center;
  text-decoration:none;
  color:white;

  box-shadow:0 10px 30px rgba(0,0,0,.35);
  transition:.4s;

  opacity:0;
  transform:translateY(30px);
  animation:fadeUp .8s forwards;
}

.card:nth-of-type(1){animation-delay:.2s;}
.card:nth-of-type(2){animation-delay:.4s;}
.card:nth-of-type(3){animation-delay:.6s;}
.card:nth-of-type(4){animation-delay:.8s;}
.card:nth-of-type(5){animation-delay:1s;}
.card:nth-of-type(6){animation-delay:1.2s;}

.card:hover{
  transform:translateY(-7px) scale(1.04);
  background:linear-gradient(135deg,var(--maroon),var(--brown));
  box-shadow:0 25px 55px rgba(128,0,32,.9);
}

.card:active{
  transform:scale(.96);
}

.left{
  display:flex;
  align-items:center;
  gap:12px;
}

.left i{
  color:#ffd7c2;
  font-size:20px;
}

/* ===== ANIMATION ===== */
@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
